# Hydropark - `worker` trust zone (BACKEND-DESIGN.md §2, §6.2, §7.3;
# AGENT-CONTRACT.md "Trust zones"; sprint/phase-1-backend.md P1-21.1b).
#
# The settlement worker. NO [http_service] / [[services]] block -
# INTENTIONAL, same reasoning as fly.issuer.toml: no public ingress, reachable
# only over the private 6PN network at http://hydropark-worker.internal:8080.
#
# Sole holder of HP_STRIPE_WEBHOOK_SECRET. Sole principal that writes
# settled_orders + grants (enforced by the hp_worker Atlas role - see
# deploy/fly/atlas-roles.js - not merely by network isolation: "isolation ≠
# authorization", BACKEND-DESIGN §6.2 N3 / §11.2 #4).
#
# `api`'s public POST /v1/webhooks/mor captures raw bytes and enqueues only -
# it verifies nothing and holds no secret (AGENT-CONTRACT.md security
# property #4). This app is where the HMAC signature is actually checked,
# over the raw body, before parsing.

app = "hydropark-worker"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "10s"

[env]
  SPRING_PROFILES_ACTIVE = "fly"
  HP_API_ENABLED = "false"
  HP_ISSUER_ENABLED = "false"
  HP_WORKER_ENABLED = "true"
  HP_MIGRATION_ENABLED = "false"
  HP_PAYMENT_PROVIDER = "stripe"
  # Secrets NOT set here in plaintext (see deploy/fly/bootstrap-secrets.ps1):
  #   HP_INTERNAL_TOKEN, HP_STRIPE_API_KEY, HP_STRIPE_WEBHOOK_SECRET,
  #   MONGODB_URI (the hp_worker Atlas user - see deploy/fly/atlas-roles.js -
  #   the only role with insert/update on settled_orders + grants).
  # This is the ONLY app in the fleet that may ever hold HP_STRIPE_WEBHOOK_SECRET.
  # NEVER set here: HP_LICENSE_PRIVATE_KEY / HP_LICENSE_PUBLIC_KEY.
  #
  # --- Internal mTLS (BACKEND-DESIGN §6.2, ticket P1-16.9) - OPT-IN, documented ---
  # Default OFF (shared X-Internal-Token). To turn mTLS on for this app, set:
  #   HP_INTERNAL_MTLS_ENABLED = "true"
  #   HP_INTERNAL_MTLS_PORT = "8443"                      # dedicated mTLS connector
  #   HP_INTERNAL_MTLS_KEYSTORE = "/certs/worker.p12"     # worker's SERVER cert
  #   HP_INTERNAL_MTLS_TRUSTSTORE = "/certs/truststore.p12"
  # and stage passwords + base64 cert secrets via bootstrap-secrets.ps1 -Mtls:
  #   HP_INTERNAL_MTLS_KEYSTORE_PASSWORD, HP_INTERNAL_MTLS_TRUSTSTORE_PASSWORD,
  #   HP_INTERNAL_MTLS_KEYSTORE_B64 (= base64 of worker.p12),
  #   HP_INTERNAL_MTLS_TRUSTSTORE_B64 (= base64 of truststore.p12).
  # [[files]] materializes the cert bytes onto the machine:
  # [[files]]
  #   guest_path = "/certs/worker.p12"
  #   secret_name = "HP_INTERNAL_MTLS_KEYSTORE_B64"
  # [[files]]
  #   guest_path = "/certs/truststore.p12"
  #   secret_name = "HP_INTERNAL_MTLS_TRUSTSTORE_B64"
  # The worker never scales to zero and is reached over raw 6PN
  # (hydropark-worker.internal), which addresses the always-up machine directly - so
  # the mTLS connector on 8443 needs NO service block; the api just calls
  # https://hydropark-worker.internal:8443/internal/... with its client cert.

# The worker deliberately does NOT scale to zero, and has no service block.
#
# Nothing calls it to wake it up: it *polls* `webhook_events` on a schedule. A
# suspended worker receives no traffic, so nothing ever starts it, and settled
# payments would silently stop being settled - the failure would look like Stripe
# not delivering webhooks rather than like a stopped machine. Keep exactly one
# machine running:
#
#     fly scale count 1 -a hydropark-worker
#
# The api reaches its /internal endpoints over plain 6PN DNS
# (hydropark-worker.internal), which is fine precisely because it is always up.
# Machine checks are a NAMED map, not an array of tables: `[checks.<name>]`.
# `[[checks]]` parses as valid TOML and is rejected by flyctl with
# "check item name not a string" - a TOML parser will not catch this, only
# `flyctl config validate` will.
[checks]
  [checks.readiness]
    port = 8080
    type = "http"
    method = "GET"
    path = "/actuator/health/readiness"
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
