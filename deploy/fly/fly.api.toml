# Hydropark - `api` trust zone (BACKEND-DESIGN.md §2, §6.2;
# AGENT-CONTRACT.md "Trust zones"; sprint/phase-1-backend.md P1-21.1a/1b).
#
# PUBLIC ingress. Holds NO signing key (HP_LICENSE_PRIVATE_KEY) and NO MoR
# webhook secret (HP_STRIPE_WEBHOOK_SECRET) - see deploy/README.md's
# secret-distribution matrix and deploy/fly/bootstrap-secrets.ps1, which
# refuses to set the license key on this app.
#
# Deploy with deploy/fly/deploy-cloud.ps1 (issuer + worker first, then this
# app) - not `fly deploy` directly, since [build] is intentionally omitted
# here (the Dockerfile lives at backend/Dockerfile, one level up from
# backend/ itself is the repo root; deploy-cloud.ps1 passes --dockerfile and
# the build context explicitly so this file doesn't need a fragile relative
# path).

app = "hydropark-api"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "10s"

[env]
  SPRING_PROFILES_ACTIVE = "fly"
  HP_API_ENABLED = "true"
  HP_ISSUER_ENABLED = "false"
  HP_WORKER_ENABLED = "false"
  # The `fly` Spring profile already defaults hydropark.migration.enabled to
  # false (application.yml) - migrations run ONLY via [deploy] release_command
  # below, never at a regular instance's boot.
  HP_MIGRATION_ENABLED = "false"
  # Flycast/6PN internal DNS - reaches the issuer/worker apps' private
  # network address directly. No public route exists to either (their
  # fly.*.toml files omit http_service/services entirely).
  # `.flycast`, not `.internal`, for the issuer. `.internal` is raw 6PN DNS: it
  # addresses the machine directly and cannot start a stopped one. Flycast routes
  # through the Fly proxy, which auto-starts a suspended machine on first request
  # - that is what lets the issuer scale to zero. Allocate its private address once:
  #     fly ips allocate-v6 --private -a hydropark-issuer
  # No public IP is ever allocated for it, so there is still no public ingress.
  HP_ISSUER_URL = "http://hydropark-issuer.flycast:8080"
  # The worker never scales to zero (it polls webhook_events on a schedule), so
  # plain 6PN DNS is fine and avoids a proxy hop on the wallet-purchase path.
  HP_WORKER_URL = "http://hydropark-worker.internal:8080"
  HP_PAYMENT_PROVIDER = "stripe"
  HP_CHECKOUT_SUCCESS_URL = "hydropark://purchase/callback"
  HP_CHECKOUT_CANCEL_URL = "hydropark://purchase/cancel"
  # Secrets NOT set here (see deploy/fly/bootstrap-secrets.ps1):
  #   HP_INTERNAL_TOKEN, HP_JWT_PRIVATE_KEY, HP_STRIPE_API_KEY, MONGODB_URI.
  # NEVER set here: HP_LICENSE_PRIVATE_KEY, HP_LICENSE_PUBLIC_KEY,
  # HP_STRIPE_WEBHOOK_SECRET - those belong to issuer / worker only.

# NO [deploy] release_command, deliberately. Migrations run out-of-band as
# hp_migrator_user - see deploy/fly/migrate-cloud.ps1. Two independent reasons:
#
#  1. Privilege. A release_command on this app runs with THIS app's MONGODB_URI,
#     i.e. as hp_api_user - which is read-only on `grants` and cannot create an
#     index anywhere (atlas-roles.js, asserted by privcheck.js). Migrations create
#     indexes on `grants`, `users`, and `licenses`. Making it work would mean
#     granting the public tier the right to create - and therefore drop - the
#     unique indexes that enforce webhook dedupe and one-license-per-device. That
#     is exactly the privilege the role split exists to withhold.
#
#  2. Mechanics. This image's ENTRYPOINT is
#     ["java", "org.springframework.boot.loader.launch.JarLauncher"], and Fly
#     prefixes the image ENTRYPOINT to the release command. A release_command
#     beginning with `java -D…` would execute
#         java JarLauncher java -D… JarLauncher
#     passing the -D flags as *program arguments* rather than JVM options. The
#     migration flags would never take effect and the "migration" would boot a web
#     server instead. Spring's own `--key=value` command-line args would work here,
#     but reason (1) rules the whole approach out regardless.

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero when idle. `suspend` snapshots memory so a warm JVM resumes in
  # well under a second; `stop` would mean a ~15s cold JVM boot on the first
  # request after idling, which the Fly proxy holds open but users feel.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "30s"
  interval = "15s"
  method = "GET"
  path = "/actuator/health/readiness"
  timeout = "5s"

[[http_service.checks]]
  grace_period = "30s"
  interval = "15s"
  method = "GET"
  path = "/actuator/health/liveness"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
