# Hydropark local stack (BACKEND-DESIGN.md §2, §6.2; AGENT-CONTRACT.md
# "Trust zones"; sprint/phase-1-backend.md P1-21.1b).
#
# One backend IMAGE, four containers with different roles, chosen entirely by
# env vars:
#   mongo       mongo:7 as a single-node replica set (required for the
#               multi-document transactions the money paths use - see
#               `mongo` and `mongo-init` below).
#   migrate     runs schema migrations (+ optional seed) to completion, then
#               exits 0. Everything else waits on it.
#   api         public ingress. Holds NO signing key, NO MoR webhook secret.
#   issuer      NO published port. Sole holder of HP_LICENSE_PRIVATE_KEY.
#   worker      NO published port. Sole holder of HP_STRIPE_WEBHOOK_SECRET.
#
# `issuer` and `worker` publish no ports on purpose: BACKEND-DESIGN §2's
# isolation rule is "the License Issuer is reachable only from the settlement
# worker / Entitlements over an internal path... no route from the public
# edge" - and the settlement worker is symmetrically internal-only. Making
# that physically true (no `ports:` entry, so nothing outside the compose
# network - including you, on the host - can reach them directly) is what
# makes "isolation ≠ authorization" (§6.2 N3) a fact about the deployment
# rather than a sentence in a design doc. `api` reaches them over the
# compose-internal DNS names `http://issuer:8080` / `http://worker:8080`,
# authenticated by the shared HP_INTERNAL_TOKEN bearer secret (see
# InternalHttpConfig.java) - a network boundary, not a permission: the Issuer
# still independently re-verifies settlement on every call.
#
# Variables come from `deploy/.env` (copy `deploy/.env.example` - docker
# compose auto-loads a `.env` file next to this compose file). Each service
# below lists ONLY the vars that zone is allowed to hold - never a blanket
# `env_file:` for api/issuer/worker, since that would silently hand every
# secret to every container regardless of what the app config maps.

name: hydropark

x-common-app-env: &common-app-env
  MONGODB_URI: "mongodb://mongo:27017/hydropark?replicaSet=rs0"
  LOG_LEVEL: "${LOG_LEVEL:-INFO}"
  SPRING_PROFILES_ACTIVE: "docker"
  # This stack runs FOUR JVMs plus mongod. A default JVM sizes its heap from the
  # container limit, and three unconstrained heaps will OOM-kill each other on a
  # stock Docker Desktop VM (2 GB). MaxRAMPercentage keeps each heap inside its
  # mem_limit; SerialGC because G1's per-region overhead is not worth paying on a
  # ~250 MB heap.
  JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=70 -XX:+UseSerialGC -Xss512k"

services:
  # ---------------------------------------------------------------------
  # mongo - single-node replica set. NOT optional: the wallet debit +
  # grant + settled_orders write commits in one multi-document transaction
  # (AGENT-CONTRACT.md "Non-negotiable security properties" #6/#8), and
  # Mongo only offers transactions on a replica set. A standalone mongod
  # would let every settlement test pass locally and then fail in
  # production the moment a transaction is opened.
  # ---------------------------------------------------------------------
  mongo:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    mem_limit: 448m
    networks: [hydropark]
    # This healthcheck only asks "is mongod answering" - it must NOT require
    # the replica set to already be initiated, or nothing could ever start
    # (mongo-init below is what runs rs.initiate(), and it depends on this
    # healthcheck, not the other way around).
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # ---------------------------------------------------------------------
  # mongo-init - one-shot: waits for mongod to accept connections, then
  # runs rs.initiate() with a retry loop. Tolerates "already initialized"
  # (safe to re-run e.g. after `docker compose up` on an existing volume).
  # The replica-set host must resolve from OTHER containers, so it is
  # initiated as `mongo:27017` (the compose service DNS name), never
  # `localhost` or `127.0.0.1`.
  # ---------------------------------------------------------------------
  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    networks: [hydropark]
    restart: "no"
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -e
        echo "mongo-init: waiting for rs0 to be initiated (or initiating it)..."
        for i in $$(seq 1 30); do
          if mongosh --host mongo --quiet --eval '
            try {
              rs.status();
              print("rs0 already initiated");
              quit(0);
            } catch (e) {
              if (e.codeName === "NotYetInitialized" || /no replset config/i.test(e.message)) {
                print("initiating rs0...");
                var res = rs.initiate({ _id: "rs0", members: [ { _id: 0, host: "mongo:27017" } ] });
                printjson(res);
                if (res.ok === 1) { quit(0); } else { quit(1); }
              } else {
                print("unexpected error: " + e.message);
                quit(1);
              }
            }
          '; then
            echo "mongo-init: done"
            exit 0
          fi
          echo "mongo-init: retry $$i/30..."
          sleep 2
        done
        echo "mongo-init: giving up after 30 retries" >&2
        exit 1

  # ---------------------------------------------------------------------
  # migrate - runs io.hydropark.migration.MigrationBootstrap in
  # exit-after mode: applies migrations (and seeds catalog data, if
  # enabled), then calls System.exit(0). Everything else depends on this
  # completing successfully, so schema always advances before any zone
  # serves traffic - never a race between whichever replica boots first.
  # ---------------------------------------------------------------------
  migrate:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: hydropark-backend:local
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    environment:
      <<: *common-app-env
      HP_API_ENABLED: "false"
      HP_ISSUER_ENABLED: "false"
      HP_WORKER_ENABLED: "false"
      HP_MIGRATION_ENABLED: "true"
      HP_MIGRATION_EXIT_AFTER: "true"
      HP_SEED_ENABLED: "${HP_SEED_ENABLED:-false}"
      # A one-shot job has no callers. Starting Tomcat would bind a port, add
      # ~80 MB, and delay the exit for nothing.
      SPRING_MAIN_WEB_APPLICATION_TYPE: "none"
    mem_limit: 512m
    networks: [hydropark]

  # ---------------------------------------------------------------------
  # api - public ingress. Holds NO signing key and NO MoR webhook secret
  # (BACKEND-DESIGN §2). It creates checkout sessions (hence
  # HP_STRIPE_API_KEY, a *different* secret than the webhook secret) and
  # issues/verifies access tokens (HP_JWT_PRIVATE_KEY), but license
  # issuance and settlement are always delegated over the internal network.
  # ---------------------------------------------------------------------
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: hydropark-backend:local
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *common-app-env
      HP_API_ENABLED: "true"
      HP_ISSUER_ENABLED: "false"
      HP_WORKER_ENABLED: "false"
      HP_MIGRATION_ENABLED: "false"
      HP_ISSUER_URL: "http://issuer:8080"
      HP_WORKER_URL: "http://worker:8080"
      HP_INTERNAL_TOKEN: "${HP_INTERNAL_TOKEN:?set HP_INTERNAL_TOKEN in deploy/.env - shared by api/issuer/worker}"
      HP_JWT_PRIVATE_KEY: "${HP_JWT_PRIVATE_KEY:-}"
      HP_JWT_KEY_ID: "${HP_JWT_KEY_ID:-hp-access-dev}"
      HP_PAYMENT_PROVIDER: "${HP_PAYMENT_PROVIDER:-fake}"
      HP_STRIPE_API_KEY: "${HP_STRIPE_API_KEY:-}"
      HP_CHECKOUT_SUCCESS_URL: "${HP_CHECKOUT_SUCCESS_URL:-hydropark://purchase/callback}"
      HP_CHECKOUT_CANCEL_URL: "${HP_CHECKOUT_CANCEL_URL:-hydropark://purchase/cancel}"
      # DEV ONLY. Writes email-verification / password-reset / step-up codes to the log in
      # cleartext, so a local smoke test can complete a step-up flow instead of hand-inserting a
      # challenge document into Mongo. Defaults to false. Never set this in a deployed environment.
      # (Spring relaxed binding maps this env var onto `hydropark.auth.log-codes`.)
      HYDROPARK_AUTH_LOG_CODES: "${HP_AUTH_LOG_CODES:-false}"
      # NOTE: HP_STRIPE_WEBHOOK_SECRET is intentionally NOT set here. The
      # public POST /v1/webhooks/mor handler captures raw bytes and enqueues
      # only; verification happens in `worker`, which alone holds the secret
      # (AGENT-CONTRACT.md security property #4).
      # NOTE: HP_LICENSE_* is intentionally NOT set here. `api` must never
      # hold the Issuer's Ed25519 private key (BACKEND-DESIGN §6.2).
    ports:
      - "8080:8080"
    mem_limit: 512m
    networks: [hydropark]

  # ---------------------------------------------------------------------
  # issuer - the Ed25519 (JWS) signing service. NO `ports:` entry: nothing
  # outside this compose network - not even the host - can reach it
  # directly. Only `api` talks to it, over http://issuer:8080, bearing
  # HP_INTERNAL_TOKEN. Sole holder of the license private key.
  # ---------------------------------------------------------------------
  issuer:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: hydropark-backend:local
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *common-app-env
      HP_API_ENABLED: "false"
      HP_ISSUER_ENABLED: "true"
      HP_WORKER_ENABLED: "false"
      HP_MIGRATION_ENABLED: "false"
      HP_INTERNAL_TOKEN: "${HP_INTERNAL_TOKEN:?set HP_INTERNAL_TOKEN in deploy/.env - shared by api/issuer/worker}"
      HP_LICENSE_KID: "${HP_LICENSE_KID:-hp-lic-dev}"
      HP_LICENSE_PRIVATE_KEY: "${HP_LICENSE_PRIVATE_KEY:?set HP_LICENSE_PRIVATE_KEY in deploy/.env - run deploy/scripts/generate-keys.ps1. This must NEVER be set on the api or worker service.}"
      HP_LICENSE_PUBLIC_KEY: "${HP_LICENSE_PUBLIC_KEY:?set HP_LICENSE_PUBLIC_KEY in deploy/.env - run deploy/scripts/generate-keys.ps1}"
    expose:
      - "8080"
    mem_limit: 384m
    networks: [hydropark]

  # ---------------------------------------------------------------------
  # worker - the settlement worker. NO `ports:` entry, same reasoning as
  # `issuer`. Sole holder of HP_STRIPE_WEBHOOK_SECRET; sole writer of
  # settled_orders + grants (enforced by Atlas roles in the cloud path -
  # see deploy/fly/atlas-roles.js - and by which zone's code path is live
  # here).
  # ---------------------------------------------------------------------
  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: hydropark-backend:local
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *common-app-env
      HP_API_ENABLED: "false"
      HP_ISSUER_ENABLED: "false"
      HP_WORKER_ENABLED: "true"
      HP_MIGRATION_ENABLED: "false"
      HP_INTERNAL_TOKEN: "${HP_INTERNAL_TOKEN:?set HP_INTERNAL_TOKEN in deploy/.env - shared by api/issuer/worker}"
      HP_PAYMENT_PROVIDER: "${HP_PAYMENT_PROVIDER:-fake}"
      HP_STRIPE_API_KEY: "${HP_STRIPE_API_KEY:-}"
      HP_STRIPE_WEBHOOK_SECRET: "${HP_STRIPE_WEBHOOK_SECRET:-}"
      # NOTE: HP_LICENSE_* is intentionally NOT set here either - only
      # `issuer` ever holds the license private key.
    expose:
      - "8080"
    mem_limit: 384m
    networks: [hydropark]

  # ---------------------------------------------------------------------
  # mongo-express - optional local Mongo UI. `docker compose --profile tools up -d`
  # to include it. Never part of the default stack.
  # ---------------------------------------------------------------------
  mongo-express:
    image: mongo-express:1
    profiles: ["tools"]
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_URL: "mongodb://mongo:27017/?replicaSet=rs0"
      ME_CONFIG_BASICAUTH: "false"
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
    ports:
      - "8081:8081"
    networks: [hydropark]

networks:
  hydropark:
    driver: bridge

volumes:
  mongo_data:
