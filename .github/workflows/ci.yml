name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------------------------
  # backend: mvn verify against the Java (Spring Boot) monolith in backend/.
  #
  # backend/pom.xml pins <docker.api.version>1.44</docker.api.version>. Without that pin,
  # Testcontainers' docker-java client negotiates Docker API v1.32 by default; a modern Docker
  # Engine (25+, as shipped on ubuntu-latest runners) reports a higher MinAPIVersion and answers
  # /info to that stale negotiated version with a bare HTTP 400. Testcontainers surfaces that 400
  # as the thoroughly misleading "Could not find a valid Docker environment" - which reads like
  # Docker isn't installed/running at all, when it actually is. The pom's property fixes the
  # negotiated version so `mvn verify`'s Testcontainers-backed integration tests (MongoDB replica
  # set) actually reach the runner's Docker daemon. Nothing in this workflow needs to repeat the
  # pin - it lives in the pom and applies to any `mvn` invocation.
  # ---------------------------------------------------------------------------------------------
  backend:
    name: backend (mvn verify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: mvn -B verify
        working-directory: backend
        run: mvn -B verify

  # ---------------------------------------------------------------------------------------------
  # client: build the Angular web app under client/web (the Tauri webview frontend).
  # ---------------------------------------------------------------------------------------------
  client:
    name: client (ng build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/web/package-lock.json

      - name: npm ci
        working-directory: client/web
        run: npm ci

      - name: npm run build
        working-directory: client/web
        run: npm run build

  # ---------------------------------------------------------------------------------------------
  # compose-smoke: bring up the full local trust-zone stack (mongo rs0 + migrate + api + issuer +
  # worker, per deploy/docker-compose.yml) with a throwaway generated deploy/.env, and assert the
  # two things deploy/local/smoke.sh asserts: /actuator/health is UP and GET /v1/catalog is
  # non-empty. Needs `backend` so we don't spend a `docker compose up --build` cycle on code that
  # doesn't even compile/test.
  #
  # References no secret that does not exist anywhere in this repo. HP_PAYMENT_PROVIDER=fake is
  # the stack's own default (deploy/.env.example) and needs zero payment-provider credentials -
  # Stripe (HP_STRIPE_API_KEY / HP_STRIPE_WEBHOOK_SECRET) is never configured here, on purpose.
  # ---------------------------------------------------------------------------------------------
  compose-smoke:
    name: compose-smoke (docker compose up + health/catalog check)
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - name: Generate deploy/.env (throwaway keys, CI-only)
        working-directory: deploy
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"

          # HP_INTERNAL_TOKEN - zone-crossing bearer secret shared by api/issuer/worker
          # (InternalHttpConfig.java, header X-Internal-Token). Any long random string is fine.
          HP_INTERNAL_TOKEN="$(openssl rand -hex 32)"

          # Ed25519 keypair for the License Issuer (HP_LICENSE_PRIVATE_KEY / HP_LICENSE_PUBLIC_KEY),
          # PKCS#8 private / X.509 public, base64 - the exact shape backend/docs and
          # deploy/scripts/generate-keys.sh produce.
          openssl genpkey -algorithm ed25519 -out "$TMP_DIR/ed_priv.pem" 2>/dev/null
          openssl pkcs8 -topk8 -nocrypt -in "$TMP_DIR/ed_priv.pem" -outform DER -out "$TMP_DIR/ed_priv.der" 2>/dev/null
          openssl pkey -in "$TMP_DIR/ed_priv.pem" -pubout -outform DER -out "$TMP_DIR/ed_pub.der" 2>/dev/null
          HP_LICENSE_PRIVATE_KEY="$(openssl base64 -A -in "$TMP_DIR/ed_priv.der")"
          HP_LICENSE_PUBLIC_KEY="$(openssl base64 -A -in "$TMP_DIR/ed_pub.der")"

          # RSA-2048 keypair for access-token signing (HP_JWT_PRIVATE_KEY), PKCS#8 private, base64.
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out "$TMP_DIR/rsa_priv.pem" 2>/dev/null
          # MUST be `pkcs8 -topk8`, not `pkey -outform DER`: the latter writes traditional PKCS#1
          # for RSA (no AlgorithmIdentifier), and Java's PKCS8EncodedKeySpec rejects it with
          # "algid parse error, not a sequence". Ed25519 has no traditional form, so only `api` dies.
          openssl pkcs8 -topk8 -nocrypt -in "$TMP_DIR/rsa_priv.pem" -outform DER -out "$TMP_DIR/rsa_priv.der" 2>/dev/null
          HP_JWT_PRIVATE_KEY="$(openssl base64 -A -in "$TMP_DIR/rsa_priv.der")"

          rm -rf "$TMP_DIR"

          {
            echo "HP_INTERNAL_TOKEN=$HP_INTERNAL_TOKEN"
            echo "HP_LICENSE_KID=hp-lic-ci"
            echo "HP_LICENSE_PRIVATE_KEY=$HP_LICENSE_PRIVATE_KEY"
            echo "HP_LICENSE_PUBLIC_KEY=$HP_LICENSE_PUBLIC_KEY"
            echo "HP_JWT_PRIVATE_KEY=$HP_JWT_PRIVATE_KEY"
            echo "HP_JWT_KEY_ID=hp-access-ci"
            echo "HP_PAYMENT_PROVIDER=fake"
            echo "HP_SEED_ENABLED=true"
            echo "LOG_LEVEL=INFO"
          } > .env
          # Never echo key material to the job log.
          echo "deploy/.env generated ($(wc -l < .env) lines)."

      - name: docker compose up -d --build
        working-directory: deploy
        run: docker compose up -d --build

      - name: Wait for /actuator/health (bounded poll)
        run: |
          set -u
          ok=0
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null -w '%{http_code}' http://localhost:8080/actuator/health 2>/dev/null | grep -q '^200$'; then
              echo "healthy after ${i} attempt(s)"
              ok=1
              break
            fi
            sleep 5
          done
          if [ "$ok" -ne 1 ]; then
            echo "api never became healthy within the bound - dumping logs" >&2
            docker compose -f deploy/docker-compose.yml logs
            exit 1
          fi

      - name: Assert GET /v1/catalog is non-empty
        run: bash deploy/local/smoke.sh http://localhost:8080

      - name: docker compose down -v
        if: always()
        working-directory: deploy
        run: docker compose down -v
