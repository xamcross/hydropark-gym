name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------------------------
  # backend: mvn verify against the Java (Spring Boot) monolith in backend/.
  #
  # backend/pom.xml pins <docker.api.version>1.44</docker.api.version>. Without that pin,
  # Testcontainers' docker-java client negotiates Docker API v1.32 by default; a modern Docker
  # Engine (25+, as shipped on ubuntu-latest runners) reports a higher MinAPIVersion and answers
  # /info to that stale negotiated version with a bare HTTP 400. Testcontainers surfaces that 400
  # as the thoroughly misleading "Could not find a valid Docker environment" - which reads like
  # Docker isn't installed/running at all, when it actually is. The pom's property fixes the
  # negotiated version so `mvn verify`'s Testcontainers-backed integration tests (MongoDB replica
  # set) actually reach the runner's Docker daemon. Nothing in this workflow needs to repeat the
  # pin - it lives in the pom and applies to any `mvn` invocation.
  # ---------------------------------------------------------------------------------------------
  backend:
    name: backend (mvn verify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: mvn -B verify
        working-directory: backend
        run: mvn -B verify

  # ---------------------------------------------------------------------------------------------
  # client: build the Angular web app under client/web (the Tauri webview frontend).
  # ---------------------------------------------------------------------------------------------
  client:
    name: client (ng build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/web/package-lock.json

      - name: npm ci
        working-directory: client/web
        run: npm ci

      - name: npm run build
        working-directory: client/web
        run: npm run build

  # ---------------------------------------------------------------------------------------------
  # compose-smoke: bring up the full local trust-zone stack (mongo rs0 + migrate + api + issuer +
  # worker, per deploy/docker-compose.yml) with a throwaway generated deploy/.env, and assert the
  # two things deploy/local/smoke.sh asserts: /actuator/health is UP and GET /v1/catalog is
  # non-empty. Needs `backend` so we don't spend a `docker compose up --build` cycle on code that
  # doesn't even compile/test.
  #
  # References no secret that does not exist anywhere in this repo. HP_PAYMENT_PROVIDER=fake is
  # the stack's own default (deploy/.env.example) and needs zero payment-provider credentials -
  # Stripe (HP_STRIPE_API_KEY / HP_STRIPE_WEBHOOK_SECRET) is never configured here, on purpose.
  # ---------------------------------------------------------------------------------------------
  compose-smoke:
    name: compose-smoke (docker compose up + health/catalog check)
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - name: Generate deploy/.env (throwaway keys, CI-only)
        working-directory: deploy
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"

          # HP_INTERNAL_TOKEN - zone-crossing bearer secret shared by api/issuer/worker
          # (InternalHttpConfig.java, header X-Internal-Token). Any long random string is fine.
          HP_INTERNAL_TOKEN="$(openssl rand -hex 32)"

          # ES256 (P-256) keypair for the License Issuer (HP_LICENSE_PRIVATE_KEY /
          # HP_LICENSE_PUBLIC_KEY), PKCS#8 private / X.509 SPKI public, base64 - the exact shape
          # deploy/scripts/generate-keys.sh produces. The Issuer signs ES256 (ECDSA P-256) as of
          # P1-16.8; a P-256 key here must match, or the issuer zone won't load its own signing key.
          # ecparam emits SEC1; Java reads PKCS#8, so convert with `pkcs8 -topk8 -nocrypt`.
          openssl ecparam -genkey -name prime256v1 -out "$TMP_DIR/lic_priv.pem" 2>/dev/null
          openssl pkcs8 -topk8 -nocrypt -in "$TMP_DIR/lic_priv.pem" -outform DER -out "$TMP_DIR/lic_priv.der" 2>/dev/null
          openssl pkey -in "$TMP_DIR/lic_priv.pem" -pubout -outform DER -out "$TMP_DIR/lic_pub.der" 2>/dev/null
          HP_LICENSE_PRIVATE_KEY="$(openssl base64 -A -in "$TMP_DIR/lic_priv.der")"
          HP_LICENSE_PUBLIC_KEY="$(openssl base64 -A -in "$TMP_DIR/lic_pub.der")"

          # RSA-2048 keypair for access-token signing (HP_JWT_PRIVATE_KEY), PKCS#8 private, base64.
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out "$TMP_DIR/rsa_priv.pem" 2>/dev/null
          # MUST be `pkcs8 -topk8`, not `pkey -outform DER`: the latter writes traditional PKCS#1
          # for RSA (no AlgorithmIdentifier), and Java's PKCS8EncodedKeySpec rejects it with
          # "algid parse error, not a sequence". Ed25519 has no traditional form, so only `api` dies.
          openssl pkcs8 -topk8 -nocrypt -in "$TMP_DIR/rsa_priv.pem" -outform DER -out "$TMP_DIR/rsa_priv.der" 2>/dev/null
          HP_JWT_PRIVATE_KEY="$(openssl base64 -A -in "$TMP_DIR/rsa_priv.der")"

          # Ed25519 keypair for skill PACKAGE signing (HP_PACKAGE_SIGNING_PRIVATE_KEY /
          # HP_PACKAGE_SIGNING_PUBLIC_KEY), PKCS#8 private / X.509 SPKI public, base64 - the exact
          # shape deploy/scripts/generate-keys.sh emits and io.hydropark.packaging.PackageTrustedKeySet
          # parses (plain base64; the ed25519:<base64> wire form is the manifest signature, not these
          # env vars). A SEPARATE key class from the license key above (SPEC 13.8/8.8); never reuse one
          # for the other. Ed25519 has no traditional PKCS#1/SEC1 form, so `pkcs8 -topk8` is correct.
          openssl genpkey -algorithm ED25519 -out "$TMP_DIR/pkg_priv.pem" 2>/dev/null
          openssl pkcs8 -topk8 -nocrypt -in "$TMP_DIR/pkg_priv.pem" -outform DER -out "$TMP_DIR/pkg_priv.der" 2>/dev/null
          openssl pkey -in "$TMP_DIR/pkg_priv.pem" -pubout -outform DER -out "$TMP_DIR/pkg_pub.der" 2>/dev/null
          HP_PACKAGE_SIGNING_PRIVATE_KEY="$(openssl base64 -A -in "$TMP_DIR/pkg_priv.der")"
          HP_PACKAGE_SIGNING_PUBLIC_KEY="$(openssl base64 -A -in "$TMP_DIR/pkg_pub.der")"

          rm -rf "$TMP_DIR"

          {
            echo "HP_INTERNAL_TOKEN=$HP_INTERNAL_TOKEN"
            echo "HP_LICENSE_KID=hp-lic-ci"
            echo "HP_LICENSE_ALG=ES256"
            echo "HP_LICENSE_PRIVATE_KEY=$HP_LICENSE_PRIVATE_KEY"
            echo "HP_LICENSE_PUBLIC_KEY=$HP_LICENSE_PUBLIC_KEY"
            echo "HP_JWT_PRIVATE_KEY=$HP_JWT_PRIVATE_KEY"
            echo "HP_JWT_KEY_ID=hp-access-ci"
            echo "HP_PACKAGE_SIGNING_ENABLED=true"
            echo "HP_PACKAGE_SIGNING_KID=hp-pkg-ci"
            echo "HP_PACKAGE_SIGNING_PRIVATE_KEY=$HP_PACKAGE_SIGNING_PRIVATE_KEY"
            echo "HP_PACKAGE_SIGNING_PUBLIC_KEY=$HP_PACKAGE_SIGNING_PUBLIC_KEY"
            echo "HP_PAYMENT_PROVIDER=fake"
            echo "HP_SEED_ENABLED=true"
            echo "LOG_LEVEL=INFO"
          } > .env
          # Never echo key material to the job log.
          echo "deploy/.env generated ($(wc -l < .env) lines)."

      - name: docker compose up -d --build
        working-directory: deploy
        run: docker compose up -d --build

      - name: Wait for /actuator/health (bounded poll)
        run: |
          set -u
          ok=0
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null -w '%{http_code}' http://localhost:8080/actuator/health 2>/dev/null | grep -q '^200$'; then
              echo "healthy after ${i} attempt(s)"
              ok=1
              break
            fi
            sleep 5
          done
          if [ "$ok" -ne 1 ]; then
            echo "api never became healthy within the bound - dumping logs" >&2
            docker compose -f deploy/docker-compose.yml logs
            exit 1
          fi

      - name: Assert GET /v1/catalog is non-empty
        run: bash deploy/local/smoke.sh http://localhost:8080

      - name: docker compose down -v
        if: always()
        working-directory: deploy
        run: docker compose down -v

  client-rust:
    name: client (cargo build)
    runs-on: windows-latest   # Tauri's Windows target is the one we ship; WebView2 ships with the runner
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri
      - name: Build the Angular bundle the Tauri build embeds
        run: npm ci && npm run build
        working-directory: client/web
      # real-inference is the default feature now, so the shipped build embeds llama.cpp; bindgen
      # needs libclang. windows-latest ships LLVM + CMake; point bindgen at libclang (choco fallback).
      # The GGUF is NOT needed to build (only to run), so no model is fetched here.
      - name: Ensure libclang for bindgen (real-inference default)
        shell: pwsh
        run: |
          if (-not (Test-Path 'C:\Program Files\LLVM\bin\libclang.dll')) { choco install llvm --no-progress -y }
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      # `--features custom-protocol` is NOT optional. Without it tauri-build emits cfg(dev) and the
      # release binary loads build.devUrl instead of the embedded frontend - it compiles, links, and
      # opens on "can't reach this page". See client/README.md.
      - name: cargo build --release --features custom-protocol
        run: cargo build --release --features custom-protocol
        working-directory: client/src-tauri
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: client/src-tauri
        continue-on-error: true   # warnings are reported, not gating, while the crate is Phase-0 draft
