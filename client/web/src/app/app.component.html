<div class="shell">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">HP</span>
      <span class="brand-name">Hydropark</span>
      <span class="brand-tag">Phase 0 prototype</span>
    </div>

    <nav class="shell-nav" aria-label="Primary">
      <button
        type="button"
        class="nav-btn"
        [class.on]="view() === 'assistant'"
        [attr.aria-pressed]="view() === 'assistant'"
        (click)="setView('assistant')"
      >
        Assistant
      </button>
      <button
        type="button"
        class="nav-btn"
        [class.on]="view() === 'marketplace'"
        [attr.aria-pressed]="view() === 'marketplace'"
        (click)="setView('marketplace')"
      >
        Marketplace
      </button>
    </nav>

    <div class="topbar-actions">
      <!-- Account affordance (P1-09.1): PROMPTS login/register; never required. -->
      <app-account-menu></app-account-menu>
      <button
        type="button"
        class="theme-btn"
        (click)="toggleTheme()"
        [attr.aria-label]="'Switch to ' + (theme() === 'dark' ? 'light' : 'dark') + ' theme'"
        [title]="'Switch to ' + (theme() === 'dark' ? 'light' : 'dark') + ' theme'"
      >
        <span aria-hidden="true">{{ theme() === 'dark' ? '☀' : '☾' }}</span>
        <span>{{ theme() === 'dark' ? 'Light' : 'Dark' }}</span>
      </button>
      @if (isMock) {
        <button type="button" class="dev-btn" (click)="downloadLog()" title="Dev-only: download the in-memory JSONL session log (P0-06.1)">
          ⬇ session log
        </button>
        <button type="button" class="dev-btn" (click)="replayOnboarding()" title="Dev-only: replay the first-run onboarding (P1-11.4)">
          ▶ tour
        </button>
      }
    </div>
  </header>

  <!-- ── ASSISTANT / COMPOSE ─────────────────────────────────────────────── -->
  @if (view() === 'assistant') {
    <app-skill-toggle></app-skill-toggle>
    <app-unlock></app-unlock>

    <main class="layout">
      <section class="chat-region">
        <app-chat></app-chat>
      </section>

      <!-- P0 hardcoded skill panels (unchanged) -->
      <app-panel-dock [open]="skillEnabled()">
        <aside class="side-region" aria-label="Skill panels">
          <app-timer-stack></app-timer-stack>
          <app-editable-list></app-editable-list>
          <app-segmented-toggle></app-segmented-toggle>
        </aside>
      </app-panel-dock>

      <!-- P1 composition experience (additive): the SAME skills, mounted
           dynamically via the composed agent + layout dock + bus. -->
      <aside class="compose-region" aria-label="Composed agent">
        <app-composed-panel-host></app-composed-panel-host>
      </aside>
    </main>
  }

  <!-- ── MARKETPLACE ─────────────────────────────────────────────────────── -->
  @if (view() === 'marketplace') {
    <main class="marketplace-region">
      <app-marketplace-view></app-marketplace-view>
    </main>
  }
</div>

<!-- Global in-app notification surface (SPEC §9.7 fallback) -->
<app-toast-host></app-toast-host>

<!-- First-run onboarding & guided tour (P1-11.4 · SPEC §16.1). Self-gates on
     `onboarding.active()`; renders nothing once the flag is set. -->
<app-onboarding-overlay></app-onboarding-overlay>
