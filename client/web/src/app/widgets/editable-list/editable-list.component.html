<section
  class="panel editable-list"
  aria-label="Ingredients"
  [class.is-readonly]="isReadonly()"
  [attr.aria-describedby]="managedBy() ? 'ingredients-managed' : null"
>
  <header>
    <h2>Ingredients</h2>
    <!-- Read-only attribution (contract §5): names the writer-of-record so the
         user knows where edits go. Icon + text, never colour alone (WCAG 1.4.1). -->
    @if (managedBy(); as who) {
      <p class="managed" id="ingredients-managed" [title]="'Managed by ' + who">
        <span class="managed-icon" aria-hidden="true">🔒</span> Managed by {{ who }}
      </p>
    }
  </header>

  <!-- Edit affordance: withdrawn entirely when this widget is a read-only observer. -->
  @if (!isReadonly()) {
    <form class="add-form" (submit)="$event.preventDefault(); addItem()">
      <label class="sr-only" for="ingredient-name">Add ingredient</label>
      <input
        id="ingredient-name"
        type="text"
        placeholder="Add an ingredient…"
        [ngModel]="nameDraft()"
        (ngModelChange)="nameDraft.set($event)"
        name="ingredientName"
      />
      <button type="submit" [disabled]="!nameDraft().trim()">Add</button>
    </form>
  }

  @if (items().length === 0) {
    <p class="empty">No ingredients yet.</p>
  }

  <ul class="ingredient-list">
    @for (item of items(); track item.id) {
      <li class="ingredient-row" [class.checked]="item.checked">
        <label class="checkbox-row">
          <!-- Live-but-disabled when read-only: the check state renders, editing does not. -->
          <input
            type="checkbox"
            [checked]="item.checked"
            [disabled]="isReadonly()"
            [attr.aria-disabled]="isReadonly() ? 'true' : null"
            (change)="toggleChecked(item)"
          />
          <span class="name">{{ item.name }}</span>
          @if (item.displayQty !== undefined) {
            <span class="qty">{{ item.displayQty }} {{ item.displayUnit }}</span>
          } @else if (item.qty !== undefined) {
            <span class="qty">{{ item.qty }}</span>
          }
        </label>
        @if (!isReadonly()) {
          <button type="button" class="remove-btn" (click)="remove(item.id)" [attr.aria-label]="'Remove ' + item.name">×</button>
        }
      </li>
    }
  </ul>
</section>
