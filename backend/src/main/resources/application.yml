spring:
  application:
    name: hydropark-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/hydropark?replicaSet=rs0}
      auto-index-creation: false   # indexes are created by versioned migrations, never implicitly
  jackson:
    # The entire /v1 wire contract is snake_case (BACKEND-DESIGN §4): `next_cursor`, `skill_id`,
    # `device_id`, `checkout_url`. Setting it globally means a DTO cannot drift from the contract by
    # forgetting an annotation. Explicit @JsonProperty still wins where a name needs pinning.
    # Nulls are NOT omitted: `next_cursor: null` ends pagination, and the license payload carries an
    # explicit `"exp": null` for perpetual entitlement. Dropping either would change a signed byte
    # sequence and a documented wire shape.
    property-naming-strategy: SNAKE_CASE
  threads:
    virtual:
      enabled: true

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    io.hydropark: ${LOG_LEVEL:INFO}
    org.springframework.data.mongodb.core.MongoTemplate: WARN

hydropark:
  # ---------------------------------------------------------------------------
  # Trust zones (BACKEND-DESIGN §2, P1-21.1b). The same image boots as any of the
  # three; only `api` ever takes public ingress.
  # ---------------------------------------------------------------------------
  api:
    enabled: ${HP_API_ENABLED:true}
  issuer:
    enabled: ${HP_ISSUER_ENABLED:true}
  worker:
    enabled: ${HP_WORKER_ENABLED:true}

  # Zone-crossing. When a zone runs in-process these URLs are unused.
  internal:
    token: ${HP_INTERNAL_TOKEN:}
    issuer-url: ${HP_ISSUER_URL:}
    worker-url: ${HP_WORKER_URL:}
    # ---------------------------------------------------------------------
    # Mutual TLS on the api->issuer / api->worker hop (BACKEND-DESIGN §6.2,
    # ticket P1-16.9). ADDITIVE and OFF by default: when `enabled=false` the
    # shared X-Internal-Token path above is used exactly as before. When
    # `enabled=true`, the api client presents its client cert and issuer/worker
    # require + verify a CA-signed client cert on /internal/** (over a dedicated
    # https connector on `server-port`). Generate certs with
    # deploy/scripts/generate-internal-certs.{ps1,sh}; keystore/truststore are
    # PKCS12. mTLS is a NETWORK auth layer only - the Issuer still independently
    # re-verifies settlement underneath it (§6.2 N3).
    mtls:
      enabled: ${HP_INTERNAL_MTLS_ENABLED:false}
      server-port: ${HP_INTERNAL_MTLS_PORT:8443}
      # This zone's own identity: PKCS12 with its cert+key. On api it is the
      # CLIENT cert presented to issuer/worker; on issuer/worker it is the SERVER
      # cert presented back. One file per zone (api.p12 / issuer.p12 / worker.p12).
      keystore-path: ${HP_INTERNAL_MTLS_KEYSTORE:}
      keystore-password: ${HP_INTERNAL_MTLS_KEYSTORE_PASSWORD:}
      # The private CA, same on every zone: verifies the peer's cert.
      truststore-path: ${HP_INTERNAL_MTLS_TRUSTSTORE:}
      truststore-password: ${HP_INTERNAL_MTLS_TRUSTSTORE_PASSWORD:}

  migration:
    enabled: ${HP_MIGRATION_ENABLED:true}
    exit-after: ${HP_MIGRATION_EXIT_AFTER:false}
  seed:
    enabled: ${HP_SEED_ENABLED:false}

  auth:
    jwt-private-key: ${HP_JWT_PRIVATE_KEY:}
    jwt-key-id: ${HP_JWT_KEY_ID:hp-access-dev}
    issuer-name: hydropark
    access-token-ttl-seconds: 900
    refresh-token-ttl-seconds: 5184000   # 60 days
    refresh-retry-grace-seconds: 60

  licensing:
    issuer-claim: hydropark-licensing
    max-devices: 5
    trusted-key-set-size: 5
    max-issuances-per-user-per-hour: 20
    max-issuances-global-per-minute: 600
    # License signing keys. NEVER commit a private key. Populated from Fly secrets / .env;
    # deploy/scripts/generate-keys.{ps1,sh} emit these. New issuance is ES256 (ECDSA P-256,
    # P1-16.8); older EdDSA (Ed25519) keys may be listed too and stay trusted for verification.
    # `alg` is optional - TrustedKeySet infers it from the key material when blank.
    keys:
      - kid: ${HP_LICENSE_KID:hp-lic-dev}
        alg: ${HP_LICENSE_ALG:ES256}
        private-key: ${HP_LICENSE_PRIVATE_KEY:}
        public-key: ${HP_LICENSE_PUBLIC_KEY:}
        active: true

  # Skill PACKAGE-signing keys (P1-19.1 / P1-20). A SEPARATE key class from hydropark.licensing.*
  # (SPEC §13.8, §8.8): never reuse the sacred license key. NEVER commit a private key. Ed25519
  # (schema wire form ed25519:<base64>). The private half exists only where enabled=true (the
  # registry/signing zone); every other zone verifies with public keys only, so it boots with the
  # private key blank. `alg` is inferred from the key material when omitted.
  package-signing:
    enabled: ${HP_PACKAGE_SIGNING_ENABLED:false}
    trusted-key-set-size: 5
    keys:
      - kid: ${HP_PACKAGE_SIGNING_KID:hp-pkg-dev}
        alg: Ed25519
        private-key: ${HP_PACKAGE_SIGNING_PRIVATE_KEY:}
        public-key: ${HP_PACKAGE_SIGNING_PUBLIC_KEY:}
        active: true

  payments:
    # `fake` needs no credentials and is what docker-compose uses by default.
    # `stripe` requires HP_STRIPE_API_KEY + HP_STRIPE_WEBHOOK_SECRET.
    provider: ${HP_PAYMENT_PROVIDER:fake}
    stripe-api-key: ${HP_STRIPE_API_KEY:}
    stripe-webhook-secret: ${HP_STRIPE_WEBHOOK_SECRET:}
    success-url: ${HP_CHECKOUT_SUCCESS_URL:hydropark://purchase/callback}
    cancel-url: ${HP_CHECKOUT_CANCEL_URL:hydropark://purchase/cancel}
    max-purchases-per-user-per-day: 10

  devices:
    max-active-slots: 5
    lifetime-rotation-soft-budget: 15

---
# Local single-process dev: all three zones in one JVM.
spring:
  config:
    activate:
      on-profile: local
hydropark:
  seed:
    enabled: true

---
# docker-compose: each zone is a separate container (see deploy/docker-compose.yml).
spring:
  config:
    activate:
      on-profile: docker
logging:
  level:
    io.hydropark: DEBUG

---
# Fly.io. Migrations run as the release_command, never at instance boot.
spring:
  config:
    activate:
      on-profile: fly
hydropark:
  migration:
    enabled: ${HP_MIGRATION_ENABLED:false}
  seed:
    enabled: false
